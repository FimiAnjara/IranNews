services:
  frontoffice:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APACHE_DOCUMENT_ROOT: /var/www/html/frontoffice/public
    container_name: irannews_frontoffice
    ports:
      - "8050:80"
    environment:
      DB_HOST: db
      DB_USER: irannews_user
      DB_PASSWORD: irannews_pass
      DB_NAME: irannews
      DB_PORT: 3306
      FRONT_BASE_URL: http://localhost:8050
      BACK_BASE_URL: http://localhost:8051
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./:/var/www/html
    networks:
      - irannews_network
    restart: unless-stopped

  backoffice:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APACHE_DOCUMENT_ROOT: /var/www/html/backoffice/public
    container_name: irannews_backoffice
    ports:
      - "8051:80"
    environment:
      DB_HOST: db
      DB_USER: irannews_user
      DB_PASSWORD: irannews_pass
      DB_NAME: irannews
      DB_PORT: 3306
      FRONT_BASE_URL: http://localhost:8050
      BACK_BASE_URL: http://localhost:8051
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./:/var/www/html
    networks:
      - irannews_network
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: irannews_db
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: irannews
      MYSQL_USER: irannews_user
      MYSQL_PASSWORD: irannews_pass
      MYSQL_INITDB_ARGS: "--character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci"
    ports:
      - "3317:3306"
    volumes:
      - irannews_db_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - irannews_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 30
      interval: 5s
      start_period: 60s
    restart: unless-stopped

volumes:
  irannews_db_data:

networks:
  irannews_network:
    driver: bridge
